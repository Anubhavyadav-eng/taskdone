server:
  port: 8080

spring:
  application:
    name: task-manager
  datasource:
    url: jdbc:h2:mem:task_manager;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
  flyway:
    enabled: false

app:
  jwt:
    issuer: task-manager
    secret: ${JWT_SECRET:change-me-in-env-please-change-me-32-chars-min}
    accessTokenMinutes: 120
  auth:
    allowPasswordLogin: true
  google:
    clientId: ${GOOGLE_CLIENT_ID:}
    clientSecret: ${GOOGLE_CLIENT_SECRET:}

logging:
  level:
    org.springframework.security: INFO
